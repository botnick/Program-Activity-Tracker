version: 2
updates:
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      python-deps:
        update-types:
          - minor
          - patch
        patterns:
          - "*"

  - package-ecosystem: pip
    directory: /mcp
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      mcp-deps:
        update-types:
          - minor
          - patch
        patterns:
          - "*"

  - package-ecosystem: npm
    directory: /ui
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      ui-deps:
        update-types:
          - minor
          - patch
        patterns:
          - "*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
