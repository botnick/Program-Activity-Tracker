version: 2
updates:
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 2
    groups:
      python-deps:
        patterns:
          - "*"

  - package-ecosystem: pip
    directory: /mcp
    schedule:
      interval: weekly
    open-pull-requests-limit: 2
    groups:
      mcp-deps:
        patterns:
          - "*"

  - package-ecosystem: npm
    directory: /ui
    schedule:
      interval: weekly
    open-pull-requests-limit: 2
    groups:
      ui-deps:
        patterns:
          - "*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 1
    groups:
      github-actions:
        patterns:
          - "*"
