name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  python-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: '3.10'
          cache: 'pip'
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Lint
        run: ruff check backend service tests
      - name: Type-check
        run: mypy backend service
        continue-on-error: true
      - name: Test
        run: pytest -v --cov=backend --cov=service --cov-report=term-missing --cov-fail-under=70

  python-linux:
    # Skips ETW-touching tests (pywintrace import fails on Linux).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: '3.10'
          cache: 'pip'
      - name: Install (skip pywintrace)
        run: |
          python -m pip install --upgrade pip
          # pywintrace is win32-only; install runtime deps explicitly,
          # then install this project + dev deps with --no-deps so pip
          # doesn't try to fetch pywintrace.
          pip install fastapi==0.115.6 'starlette>=0.41,<1.0' 'uvicorn[standard]==0.34.0' pydantic==2.10.5 'pydantic-settings>=2.6' psutil==7.2.2 'prometheus-client>=0.20'
          pip install 'pytest>=8' 'pytest-asyncio>=0.23' 'pytest-cov>=5' 'ruff>=0.7' 'mypy>=1.10' 'httpx>=0.27' 'respx>=0.21'
          pip install -e . --no-deps
      - name: Lint
        run: ruff check backend service tests
      - name: Test (skip ETW)
        run: pytest tests/test_store.py tests/test_observability.py -v

  ui:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json
      - name: Install
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Build
        run: npm run build
