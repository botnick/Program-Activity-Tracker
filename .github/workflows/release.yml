name: Release

# Auto-build a release zip whenever a tag like v1.2.3 is pushed,
# and attach it to a GitHub Release. Can also be run manually.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version override (default: read from pyproject.toml)'
        required: false
        type: string

permissions:
  contents: write

jobs:
  build-windows-release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json

      - name: Build native ETW binary
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\Common7\Tools\VsDevCmd.bat" -arch=amd64
          cmake -S service\native -B service\native\build -G "Visual Studio 17 2022" -A x64 -DCMAKE_BUILD_TYPE=Release
          cmake --build service\native\build --config Release

      - name: Build UI
        shell: bash
        working-directory: ui
        run: |
          npm ci
          npm run build

      - name: Resolve version
        id: ver
        shell: pwsh
        run: |
          $v = '${{ github.event.inputs.version }}'
          if (-not $v) {
            if ('${{ github.ref_type }}' -eq 'tag') {
              $v = '${{ github.ref_name }}' -replace '^v',''
            } else {
              $line = Get-Content pyproject.toml | Where-Object { $_ -match '^\s*version\s*=\s*"' } | Select-Object -First 1
              $v = ($line -replace '^\s*version\s*=\s*"([^"]+)".*','$1').Trim()
            }
          }
          echo "version=$v" >> $env:GITHUB_OUTPUT
          Write-Host "Version: $v"

      - name: Package release zip
        shell: pwsh
        run: |
          pwsh -NoProfile -ExecutionPolicy Bypass -File scripts/build-release.ps1 `
              -Version '${{ steps.ver.outputs.version }}' `
              -SkipBuild

      - name: Upload zip as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ActivityTracker-v${{ steps.ver.outputs.version }}
          path: release/ActivityTracker-v${{ steps.ver.outputs.version }}.zip
          if-no-files-found: error

      - name: Create / update GitHub Release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Activity Tracker ${{ github.ref_name }}
          generate_release_notes: true
          files: release/ActivityTracker-v${{ steps.ver.outputs.version }}.zip
          draft: false
          prerelease: false
