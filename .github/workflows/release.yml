name: Release

# Auto-build a self-contained release zip whenever a tag like vX.Y.Z is pushed,
# and attach it to a GitHub Release.
#
# The zip contains EVERYTHING the user needs to download-and-run:
#   - tracker.exe (PyInstaller-bundled GUI launcher)
#   - python/    (embeddable Python runtime with all deps pre-installed)
#   - backend/, service/, ui/dist/, mcp/, .mcp.json
#
# No system Python / Node / Visual Studio required by the end user.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version override (default: read from tag or pyproject.toml)'
        required: false
        type: string

permissions:
  contents: write

env:
  PYTHON_EMBED_VERSION: '3.12.7'

jobs:
  build-windows-release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up build Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json

      # ---- 1. native ETW binary -----------------------------------------
      - name: Build native ETW binary
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\Common7\Tools\VsDevCmd.bat" -arch=amd64
          cmake -S service\native -B service\native\build -G "Visual Studio 17 2022" -A x64 -DCMAKE_BUILD_TYPE=Release
          cmake --build service\native\build --config Release

      # ---- 2. UI ---------------------------------------------------------
      - name: Build UI
        shell: bash
        working-directory: ui
        run: |
          npm ci
          npm run build

      # ---- 3. embeddable Python with all runtime deps pre-installed ----
      - name: Bootstrap embeddable Python
        shell: pwsh
        run: |
          $ver = '${{ env.PYTHON_EMBED_VERSION }}'
          $url = "https://www.python.org/ftp/python/$ver/python-$ver-embed-amd64.zip"
          Write-Host "==> Download $url"
          Invoke-WebRequest $url -OutFile python-embed.zip
          Expand-Archive python-embed.zip -DestinationPath python-embed -Force

          # Patch pythonXX._pth so:
          #   1. site.py runs (enables pip's site-packages)
          #   2. the release-folder parent is on sys.path so `backend.*` and
          #      `service.*` resolve when uvicorn imports them. Embeddable
          #      Python ignores PYTHONPATH when this file exists, so we MUST
          #      list parent dirs here. python.exe lives at release/python/,
          #      so '..' = release/.
          $pth = Get-ChildItem python-embed -Filter 'python*._pth' | Select-Object -First 1
          $lines = Get-Content $pth.FullName | ForEach-Object {
              if ($_ -match '^#\s*import site') { 'import site' } else { $_ }
          }
          if ($lines -notcontains '..') { $lines += '..' }
          $lines | Set-Content $pth.FullName -Encoding ASCII
          Write-Host "==> patched $($pth.Name):"
          Get-Content $pth.FullName

          # Bootstrap pip into the embeddable distribution.
          Invoke-WebRequest 'https://bootstrap.pypa.io/get-pip.py' -OutFile get-pip.py
          ./python-embed/python.exe get-pip.py --no-warn-script-location

          # Install runtime deps + MCP package into the embeddable interpreter.
          # NOTE: install MCP without -e (editable) — embeddable distros choke
          # on .pth-based egg links. A regular install copies the package into
          # site-packages, which is what we want for the release zip anyway.
          ./python-embed/python.exe -m pip install --no-warn-script-location -r scripts/release-template/requirements.txt
          ./python-embed/python.exe -m pip install --no-warn-script-location ./mcp

          # Smoke check: every import the launcher needs at runtime.
          ./python-embed/python.exe -c "import fastapi, uvicorn, psutil, pydantic_settings, prometheus_client, mcp_tracker; print('embedded python OK')"

      # ---- 4. tracker.exe via PyInstaller --------------------------------
      - name: Build tracker.exe
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller psutil
          pyinstaller launcher\launcher.spec --noconfirm --clean
          if (-not (Test-Path 'launcher\dist\tracker.exe')) {
              throw 'tracker.exe was not produced'
          }
          Get-Item launcher\dist\tracker.exe | Format-List FullName, Length

      # ---- 5. resolve version --------------------------------------------
      - name: Resolve version
        id: ver
        shell: pwsh
        run: |
          $v = '${{ github.event.inputs.version }}'
          if (-not $v) {
            if ('${{ github.ref_type }}' -eq 'tag') {
              $v = '${{ github.ref_name }}' -replace '^v',''
            } else {
              $line = Get-Content pyproject.toml | Where-Object { $_ -match '^\s*version\s*=\s*"' } | Select-Object -First 1
              $v = ($line -replace '^\s*version\s*=\s*"([^"]+)".*','$1').Trim()
            }
          }
          echo "version=$v" >> $env:GITHUB_OUTPUT
          Write-Host "Version: $v"

      # ---- 6. assemble release folder + zip ------------------------------
      - name: Package release zip
        shell: pwsh
        run: |
          pwsh -NoProfile -ExecutionPolicy Bypass -File scripts/build-release.ps1 `
              -Version '${{ steps.ver.outputs.version }}' `
              -SkipBuild `
              -PythonEmbedDir 'python-embed' `
              -LauncherExe 'launcher/dist/tracker.exe'

      - name: Upload zip as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ActivityTracker-v${{ steps.ver.outputs.version }}
          path: release/ActivityTracker-v${{ steps.ver.outputs.version }}.zip
          if-no-files-found: error

      # ---- 7. attach to GitHub Release on tag pushes ---------------------
      - name: Create / update GitHub Release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Activity Tracker ${{ github.ref_name }}
          generate_release_notes: true
          files: release/ActivityTracker-v${{ steps.ver.outputs.version }}.zip
          draft: false
          prerelease: false
